services:
  dockerweb:
    build: .
    image: dockerweb:latest
    container_name: dockerweb
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - Docker__Mode=Local
      - Docker__LocalEndpoint=unix:///var/run/docker.sock
    volumes:
      # Read-write: the app must control the host's Docker.
      - /var/run/docker.sock:/var/run/docker.sock
